<style data-atgit-offer="css">
/* Toyota Qatar — brand-matched welcome nudge */
[data-atgit-offer-host] {
  --at-tq-red: var(--color-primary-red, #eb0a1e);
  --at-tq-red-hover: var(--color-red-600, #e40014);
  --at-tq-ink: #121212;
  --at-tq-text: #252525;
  --at-tq-muted: #58595b;
  --at-tq-line: #dadadb;
  --at-tq-panel: #ffffff;
  --at-tq-soft: #f6f6f6;
  box-sizing: border-box;
  position: fixed;
  top: 50%;
  right: 20px;
  z-index: 99990;
  width: min(320px, calc(100vw - 32px));
  transform: translateY(-50%);
  font-family: Toyota Type, sans-serif;
  color: var(--at-tq-text);
  pointer-events: none;
}

[data-atgit-offer-host] *,
[data-atgit-offer-host] *::before,
[data-atgit-offer-host] *::after {
  box-sizing: border-box;
}

[data-atgit-offer-host] .at-tq-nudge {
  pointer-events: auto;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 28px 28px 24px;
  background: var(--at-tq-panel);
  border: 1px solid var(--at-tq-line);
  border-radius: 16px;
  box-shadow: 0 1px 15px rgba(0, 0, 0, 0.1), 0 20px 40px rgba(0, 0, 0, 0.12);
  animation: at-tq-slide-in 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}

[data-atgit-offer-host] .at-tq-nudge::before {
  content: "";
  position: absolute;
  top: 0;
  left: 24px;
  right: 24px;
  height: 3px;
  background: var(--at-tq-red);
  border-radius: 0 0 2px 2px;
}

[data-atgit-offer-host] .at-tq-eyebrow {
  margin: 0;
  padding-right: 28px;
  font-family: Toyota Type, sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--at-tq-red);
}

[data-atgit-offer-host] .at-tq-title {
  margin: 0;
  padding-right: 20px;
  font-family: Toyota Type, sans-serif;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--at-tq-ink);
}

[data-atgit-offer-host] .at-tq-copy {
  margin: 0;
  font-family: Toyota Type, sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--at-tq-muted);
}

[data-atgit-offer-host] .at-tq-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}

[data-atgit-offer-host] .at-tq-cta {
  appearance: none;
  border: 0;
  margin: 0;
  padding: 12px 22px;
  min-height: 48px;
  background: var(--at-tq-red);
  color: #ffffff;
  font-family: Toyota Type, sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 1.5;
  letter-spacing: 0.02em;
  border-radius: 100px;
  cursor: pointer;
  box-shadow: none;
  transition: background-color 0.2s ease, transform 0.2s ease;
}

[data-atgit-offer-host] .at-tq-cta:hover {
  background: var(--at-tq-red-hover);
  transform: translateY(-1px);
}

[data-atgit-offer-host] .at-tq-cta:focus-visible {
  outline: 2px solid var(--at-tq-ink);
  outline-offset: 2px;
}

[data-atgit-offer-host] .at-tq-secondary {
  appearance: none;
  border: 0;
  margin: 0;
  padding: 0;
  background: transparent;
  color: var(--at-tq-ink);
  font-family: Toyota Type, sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 1.5;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
}

[data-atgit-offer-host] .at-tq-secondary:hover {
  color: var(--at-tq-red);
}

[data-atgit-offer-host] .at-tq-secondary:focus-visible {
  outline: 2px solid var(--at-tq-red);
  outline-offset: 2px;
}

[data-atgit-offer-host] .at-tq-close {
  appearance: none;
  position: absolute;
  top: 10px;
  right: 10px;
  width: 36px;
  height: 36px;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 100px;
  background: var(--at-tq-soft);
  color: var(--at-tq-muted);
  font-family: Toyota Type, sans-serif;
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  transition: color 0.2s ease, background-color 0.2s ease;
}

[data-atgit-offer-host] .at-tq-close:hover {
  color: var(--at-tq-ink);
  background: #e6e8e8;
}

[data-atgit-offer-host] .at-tq-close:focus-visible {
  outline: 2px solid var(--at-tq-red);
  outline-offset: 2px;
}

[data-atgit-offer-host][data-at-state="leaving"] .at-tq-nudge {
  animation: at-tq-slide-out 0.28s ease forwards;
}

@keyframes at-tq-slide-in {
  from {
    opacity: 0;
    transform: translateX(24px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes at-tq-slide-out {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(32px);
  }
}

@media (max-width: 767px) {
  [data-atgit-offer-host] {
    top: auto;
    bottom: 16px;
    right: 12px;
    left: 12px;
    width: auto;
    transform: none;
  }

  [data-atgit-offer-host] .at-tq-nudge {
    padding: 24px 22px 20px;
  }

  [data-atgit-offer-host] .at-tq-title {
    font-size: 20px;
  }
}
</style>

<script data-atgit-offer="js">
(function () {
  var HOST_ATTR = "data-atgit-offer-host";
  var DISMISS_KEY = "atgit-tq-welcome-dismissed";

  document.querySelectorAll("[" + HOST_ATTR + "]").forEach(function (node) {
    node.remove();
  });

  try {
    if (window.sessionStorage && sessionStorage.getItem(DISMISS_KEY) === "1") {
      return;
    }
  } catch (e) {}

  var mount = document.querySelector("#root") || document.body;
  if (!mount) return;

  var host = document.createElement("div");
  host.setAttribute(HOST_ATTR, "1");
  host.setAttribute("role", "complementary");
  host.setAttribute("aria-label", "Welcome to Toyota Qatar");

  var panel = document.createElement("div");
  panel.className = "at-tq-nudge";

  var closeBtn = document.createElement("button");
  closeBtn.type = "button";
  closeBtn.className = "at-tq-close";
  closeBtn.setAttribute("aria-label", "Dismiss welcome message");
  closeBtn.textContent = "×";

  var eyebrow = document.createElement("p");
  eyebrow.className = "at-tq-eyebrow";
  eyebrow.textContent = "Toyota Qatar";

  var title = document.createElement("p");
  title.className = "at-tq-title";
  title.textContent = "Your car, your way";

  var copy = document.createElement("p");
  copy.className = "at-tq-copy";
  copy.textContent =
    "Explore sedans, SUVs, hybrids, and current offers from Al Abdulghani Motors.";

  var actions = document.createElement("div");
  actions.className = "at-tq-actions";

  var cta = document.createElement("button");
  cta.type = "button";
  cta.className = "at-tq-cta";
  cta.textContent = "Explore vehicles";

  var secondary = document.createElement("button");
  secondary.type = "button";
  secondary.className = "at-tq-secondary";
  secondary.textContent = "View offers";

  function dismiss() {
    host.setAttribute("data-at-state", "leaving");
    try {
      if (window.sessionStorage) sessionStorage.setItem(DISMISS_KEY, "1");
    } catch (err) {}
    window.setTimeout(function () {
      if (host && host.parentNode) host.parentNode.removeChild(host);
    }, 280);
  }

  function findScrollTarget(selectors) {
    for (var i = 0; i < selectors.length; i++) {
      var el = document.querySelector(selectors[i]);
      if (el) return el;
    }
    return null;
  }

  function goTo(selectors, hrefFallback) {
    var link = findScrollTarget(selectors);
    if (link && link.tagName === "A" && link.getAttribute("href")) {
      link.click();
      dismiss();
      return;
    }
    if (link && typeof link.scrollIntoView === "function") {
      link.scrollIntoView({ behavior: "smooth", block: "start" });
      dismiss();
      return;
    }
    if (hrefFallback) {
      window.location.assign(hrefFallback);
    }
    dismiss();
  }

  cta.addEventListener("click", function () {
    goTo(
      [
        'a[href="/vehicle/"]',
        'a[href*="/vehicle/"]',
        'a[href*="vehicle" i]',
        "#vehicles",
        '[id*="vehicle" i]',
      ],
      "/vehicle/"
    );
  });

  secondary.addEventListener("click", function () {
    goTo(
      [
        'a[href="/special-offers"]',
        'a[href*="special-offers"]',
        'a[href="/offers"]',
        'a[href*="/offers"]',
      ],
      "/special-offers"
    );
  });

  closeBtn.addEventListener("click", dismiss);

  actions.appendChild(cta);
  actions.appendChild(secondary);
  panel.appendChild(closeBtn);
  panel.appendChild(eyebrow);
  panel.appendChild(title);
  panel.appendChild(copy);
  panel.appendChild(actions);
  host.appendChild(panel);
  mount.appendChild(host);
})();
</script>
