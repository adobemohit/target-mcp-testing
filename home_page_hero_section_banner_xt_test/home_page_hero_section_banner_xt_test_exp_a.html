<style data-atgit-offer="css">
/* Offer styles — hero banner image swap */
.hero .hero-media img {
  object-fit: cover;
  width: 100%;
  height: 100%;
}
</style>

<script data-atgit-offer="js">
// Offer script — swap hero banner image (idempotent).
(function () {
  var existing = document.querySelectorAll("[data-atgit-offer-host]");
  for (var i = 0; i < existing.length; i++) {
    existing[i].remove();
  }

  var HERO_IMG_URL =
    "https://images.herzindagi.info/image/2024/Aug/travel-destination-for-indian-families.jpg";

  var media = document.querySelector(".hero .hero-media");
  if (!media) return;

  var heroImg = media.querySelector("img");
  if (!heroImg) {
    heroImg = document.createElement("img");
    heroImg.setAttribute("alt", "");
    heroImg.setAttribute("width", "2000");
    heroImg.setAttribute("height", "1200");
    var veil = media.querySelector(".hero-veil");
    if (veil) {
      media.insertBefore(heroImg, veil);
    } else {
      media.insertBefore(heroImg, media.firstChild);
    }
  }

  heroImg.setAttribute("src", HERO_IMG_URL);
})();
</script>
