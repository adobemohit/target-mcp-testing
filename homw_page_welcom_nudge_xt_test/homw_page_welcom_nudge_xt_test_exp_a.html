<style data-atgit-offer="css">
[data-atgit-offer-host="welcome-nudge"] {
  position: fixed;
  left: 0;
  bottom: 0;
  z-index: 2147483000;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  pointer-events: none;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge {
  pointer-events: auto;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin: 0 0 20px 20px;
  max-width: min(380px, calc(100vw - 40px));
  padding: 18px 44px 18px 18px;
  background: linear-gradient(145deg, #0b1f4d 0%, #163a7a 55%, #1a4a96 100%);
  color: #ffffff;
  border-radius: 12px 12px 12px 4px;
  box-shadow: 0 12px 32px rgba(11, 31, 77, 0.35);
  transform: translateX(-120%);
  opacity: 0;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge.is-open {
  transform: translateX(0);
  opacity: 1;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__thumb {
  flex: 0 0 64px;
  width: 64px;
  height: 64px;
  border-radius: 8px;
  object-fit: cover;
  background: rgba(255, 255, 255, 0.15);
  display: block;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__body {
  flex: 1 1 auto;
  min-width: 0;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__eyebrow {
  display: block;
  margin: 0 0 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #9ec5ff;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__title {
  margin: 0 0 8px;
  font-family: var(--font-family-bauhuas-std-medium);
  font-size: 18px;
  font-weight: 700;
  line-height: 1.25;
  color: #ffffff;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__message {
  margin: 0;
  font-size: 14px;
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.9);
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.12);
  color: #ffffff;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
}

[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__close:hover,
[data-atgit-offer-host="welcome-nudge"] .atgit-nudge__close:focus {
  background: rgba(255, 255, 255, 0.22);
  outline: none;
}

@media (max-width: 480px) {
  [data-atgit-offer-host="welcome-nudge"] .atgit-nudge {
    margin: 0 0 12px 12px;
    max-width: calc(100vw - 24px);
  }

  [data-atgit-offer-host="welcome-nudge"] .atgit-nudge__thumb {
    flex-basis: 56px;
    width: 56px;
    height: 56px;
  }
}
</style>

<script data-atgit-offer="js">
(function () {
  var HOST_ATTR = "data-atgit-offer-host";
  var HOST_VALUE = "welcome-nudge";

  document.querySelectorAll("[" + HOST_ATTR + "=\"" + HOST_VALUE + "\"]").forEach(function (node) {
    node.parentNode && node.parentNode.removeChild(node);
  });

  var body = document.body;
  if (!body) return;

  var host = document.createElement("div");
  host.setAttribute(HOST_ATTR, HOST_VALUE);

  var panel = document.createElement("aside");
  panel.className = "atgit-nudge";
  panel.setAttribute("role", "dialog");
  panel.setAttribute("aria-label", "Welcome message");

  var closeBtn = document.createElement("button");
  closeBtn.type = "button";
  closeBtn.className = "atgit-nudge__close";
  closeBtn.setAttribute("aria-label", "Close welcome message");
  closeBtn.textContent = "\u00d7";

  var thumb = document.createElement("img");
  thumb.className = "atgit-nudge__thumb";
  thumb.alt = "";
  thumb.width = 64;
  thumb.height = 64;
  thumb.src =
    "data:image/svg+xml," +
    encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">' +
        '<rect width="64" height="64" rx="8" fill="#2a5fad"/>' +
        '<circle cx="32" cy="24" r="10" fill="#9ec5ff"/>' +
        '<path d="M12 52c4-12 16-18 20-18s16 6 20 18" fill="#9ec5ff"/>' +
      "</svg>"
    );

  var content = document.createElement("div");
  content.className = "atgit-nudge__body";

  var eyebrow = document.createElement("span");
  eyebrow.className = "atgit-nudge__eyebrow";
  eyebrow.textContent = "IndiGo";

  var title = document.createElement("p");
  title.className = "atgit-nudge__title";
  title.textContent = "Welcome aboard!";

  var message = document.createElement("p");
  message.className = "atgit-nudge__message";
  message.textContent =
    "Glad you are here. Explore low fares and plan your next trip with us.";

  function dismiss() {
    panel.classList.remove("is-open");
    window.setTimeout(function () {
      if (host.parentNode) host.parentNode.removeChild(host);
    }, 450);
  }

  closeBtn.addEventListener("click", dismiss);

  content.appendChild(eyebrow);
  content.appendChild(title);
  content.appendChild(message);

  panel.appendChild(closeBtn);
  panel.appendChild(thumb);
  panel.appendChild(content);
  host.appendChild(panel);
  body.appendChild(host);

  window.requestAnimationFrame(function () {
    window.requestAnimationFrame(function () {
      panel.classList.add("is-open");
    });
  });
})();
</script>
