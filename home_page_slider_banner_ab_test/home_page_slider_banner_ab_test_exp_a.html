<style data-atgit-offer="css">
[data-atgit-offer-host] {
  margin-top:80px !important;
  box-sizing: border-box;
  position: relative;
  max-width: 1200px;
  min-height: 320px;
  margin-left: auto !important;
  margin-right: auto !important;
  overflow: hidden;
  border-radius: 12px;
  color: #fff;
  font-family: inherit;
}

[data-atgit-offer-host] *,
[data-atgit-offer-host] *::before,
[data-atgit-offer-host] *::after {
  box-sizing: border-box;
}

[data-atgit-offer-host] .atgit-banner-image {
  display: block;
  width: 100%;
  height: 100%;
  min-height: 320px;
  object-fit: cover;
  position: absolute;
  inset: 0;
  z-index: -2;
}

[data-atgit-offer-host]::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(
    90deg,
    rgba(0, 0, 0, 0.72) 0%,
    rgba(0, 0, 0, 0.4) 52%,
    rgba(0, 0, 0, 0.08) 100%
  );
}

[data-atgit-offer-host] .atgit-banner-content {
  display: flex;
  min-height: 320px;
  max-width: 620px;
  padding: 48px;
  flex-direction: column;
  justify-content: center;
  font-family: inherit;
}

[data-atgit-offer-host] .atgit-banner-title {
  margin: 0 0 12px;
  color: inherit;
  font-family: var(--font-family-bauhuas-std-medium);
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 700;
  line-height: 1.12;
}

[data-atgit-offer-host] .atgit-banner-copy {
  margin: 0;
  color: inherit;
  font-family: inherit;
  font-size: clamp(16px, 2vw, 20px);
  line-height: 1.5;
}

@media (max-width: 640px) {
  [data-atgit-offer-host] {
    min-height: 280px;
    border-radius: 8px;
  }

  [data-atgit-offer-host] .atgit-banner-image,
  [data-atgit-offer-host] .atgit-banner-content {
    min-height: 280px;
  }

  [data-atgit-offer-host] .atgit-banner-content {
    padding: 28px 24px;
  }
}
</style>

<script data-atgit-offer="js">
(function () {
  document.querySelectorAll("[data-atgit-offer-host]").forEach(function (node) {
    node.remove();
  });

  var host = document.createElement("section");
  host.setAttribute("data-atgit-offer-host", "1");
  host.setAttribute("aria-label", "Featured travel offer");

  var image = document.createElement("img");
  image.className = "atgit-banner-image";
  image.src = "https://picsum.photos/seed/indigo-travel/1600/600";
  image.alt = "";
  image.setAttribute("aria-hidden", "true");

  var content = document.createElement("div");
  content.className = "atgit-banner-content";

  var title = document.createElement("h2");
  title.className = "atgit-banner-title";
  title.textContent = "Your next journey starts here";

  var copy = document.createElement("p");
  copy.className = "atgit-banner-copy";
  copy.textContent =
    "Discover new destinations and make every trip one to remember.";

  content.appendChild(title);
  content.appendChild(copy);
  host.appendChild(image);
  host.appendChild(content);

  var target =
    document.querySelector("main") ||
    document.querySelector("#content") ||
    document.body;

  if (target) {
    host.style.fontFamily = window.getComputedStyle(target).fontFamily;
    target.insertBefore(host, target.firstChild);
  }
})();
</script>
