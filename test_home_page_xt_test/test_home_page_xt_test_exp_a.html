<style data-atgit-offer="css">
/* Horizon — destinations title personalization */
[data-atgit-offer-host="dest-title"] {
  display: none !important;
}

#dest-title[data-atgit-personalized="1"] {
  font-family: Figtree, sans-serif;
  color: rgb(14, 33, 54);
}
</style>

<script data-atgit-offer="js">
(function () {
  document.querySelectorAll("[data-atgit-offer-host]").forEach(function (node) {
    node.remove();
  });

  var title = document.querySelector("#dest-title");
  if (!title) return;

  var host = document.createElement("div");
  host.setAttribute("data-atgit-offer-host", "dest-title");
  host.setAttribute("hidden", "");
  document.body.appendChild(host);

  title.textContent = "Routes travelers are booking right now";
  title.setAttribute("data-atgit-personalized", "1");
  title.style.fontFamily = "Figtree, sans-serif";
  title.style.color = "rgb(14, 33, 54)";
})();
</script>
