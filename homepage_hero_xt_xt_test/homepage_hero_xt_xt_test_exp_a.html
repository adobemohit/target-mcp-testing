<style data-atgit-offer="css">
/* Offer styles — applied on the live page */
[data-atgit-offer-host] {
  box-sizing: border-box;
}
</style>

<script data-atgit-offer="js">
// Offer script — DOM manipulation only (no HTML authoring).
(function () {
  var existing = document.querySelector("[data-atgit-offer-host]");
  if (existing) existing.remove();

  var host = document.createElement("div");
  host.setAttribute("data-atgit-offer-host", "1");

  var title = document.createElement("strong");
  title.textContent = "ATGitOps offer";

  var note = document.createElement("span");
  note.style.marginLeft = "8px";
  note.style.opacity = "0.8";
  note.textContent = "Edit Styles + JS to customize.";

  host.appendChild(title);
  host.appendChild(note);

  var target =
    document.querySelector("main") ||
    document.querySelector("#content") ||
    document.body;
  if (target) {
    target.insertBefore(host, target.firstChild);
  }
})();
</script>
