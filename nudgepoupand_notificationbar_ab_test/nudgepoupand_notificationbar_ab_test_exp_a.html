<style data-atgit-offer="css">
[data-atgit-offer-host],
[data-atgit-offer-host] * {
  box-sizing: border-box;
}

[data-atgit-offer-host] {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 99999;
  width: min(380px, calc(100vw - 32px));
  font-family: Figtree, sans-serif;
  color: rgb(242, 247, 251);
  pointer-events: none;
}

[data-atgit-offer-host] .atgit-nudge {
  pointer-events: auto;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 20px 18px 18px;
  background:
    radial-gradient(120% 80% at 100% 0%, rgba(242, 247, 251, 0.12), transparent 55%),
    linear-gradient(165deg, rgb(14, 33, 54) 0%, rgb(10, 24, 40) 100%);
  color: rgb(242, 247, 251);
  border: 1px solid rgba(242, 247, 251, 0.14);
  border-radius: 16px;
  box-shadow: 0 22px 48px rgba(10, 24, 40, 0.42);
  animation: atgit-nudge-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

[data-atgit-offer-host] .atgit-nudge__glow {
  position: absolute;
  inset: auto -20% -40% auto;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: rgba(242, 247, 251, 0.08);
  filter: blur(28px);
  pointer-events: none;
  animation: atgit-glow-pulse 3.2s ease-in-out infinite;
}

[data-atgit-offer-host] .atgit-nudge__top {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

[data-atgit-offer-host] .atgit-nudge__icon {
  flex: 0 0 auto;
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(242, 247, 251, 0.1);
  border: 1px solid rgba(242, 247, 251, 0.16);
  display: grid;
  place-items: center;
  overflow: hidden;
}

[data-atgit-offer-host] .atgit-nudge__icon-ring {
  position: absolute;
  inset: 4px;
  border-radius: 12px;
  border: 1px solid rgba(242, 247, 251, 0.22);
  animation: atgit-ring-pulse 2.4s ease-out infinite;
}

[data-atgit-offer-host] .atgit-nudge__plane {
  width: 28px;
  height: 28px;
  color: rgb(242, 247, 251);
  animation: atgit-plane-bob 2.2s ease-in-out infinite;
  transform-origin: center;
}

[data-atgit-offer-host] .atgit-nudge__heading {
  flex: 1 1 auto;
  min-width: 0;
  padding-top: 2px;
}

[data-atgit-offer-host] .atgit-nudge__eyebrow {
  margin: 0 0 4px;
  font-family: Figtree, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(242, 247, 251, 0.62);
}

[data-atgit-offer-host] .atgit-nudge__title {
  margin: 0;
  font-family: Figtree, sans-serif;
  font-size: 19px;
  font-weight: 700;
  line-height: 1.25;
  color: rgba(255, 255, 255, 0.96);
}

[data-atgit-offer-host] .atgit-nudge__close {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  margin: -2px -2px 0 0;
  padding: 0;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: rgba(242, 247, 251, 0.85);
  font-family: Figtree, sans-serif;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
}

[data-atgit-offer-host] .atgit-nudge__close:hover {
  background: rgba(242, 247, 251, 0.1);
}

[data-atgit-offer-host] .atgit-nudge__route {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 12px;
  background: rgba(242, 247, 251, 0.08);
  border: 1px solid rgba(242, 247, 251, 0.12);
  border-radius: 12px;
}

[data-atgit-offer-host] .atgit-nudge__airport {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

[data-atgit-offer-host] .atgit-nudge__airport--to {
  text-align: right;
  align-items: flex-end;
}

[data-atgit-offer-host] .atgit-nudge__code {
  font-family: Figtree, sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: rgba(255, 255, 255, 0.98);
}

[data-atgit-offer-host] .atgit-nudge__city {
  font-family: Figtree, sans-serif;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.62);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

[data-atgit-offer-host] .atgit-nudge__flightpath {
  position: relative;
  width: 64px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

[data-atgit-offer-host] .atgit-nudge__flightpath-line {
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 1px;
  background: linear-gradient(
    90deg,
    rgba(242, 247, 251, 0.15),
    rgba(242, 247, 251, 0.55),
    rgba(242, 247, 251, 0.15)
  );
}

[data-atgit-offer-host] .atgit-nudge__flightpath-dot {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgb(242, 247, 251);
  top: 50%;
  margin-top: -2.5px;
  left: 0;
  animation: atgit-path-dot 2.4s linear infinite;
  box-shadow: 0 0 10px rgba(242, 247, 251, 0.55);
}

[data-atgit-offer-host] .atgit-nudge__miniplane {
  position: relative;
  z-index: 1;
  width: 18px;
  height: 18px;
  color: rgb(242, 247, 251);
  animation: atgit-miniplane 2.4s ease-in-out infinite;
}

[data-atgit-offer-host] .atgit-nudge__copy {
  position: relative;
  margin: 0;
  font-family: Figtree, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.78);
}

[data-atgit-offer-host] .atgit-nudge__timer {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(242, 247, 251, 0.1);
  border: 1px solid rgba(242, 247, 251, 0.14);
  font-family: Figtree, sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.88);
}

[data-atgit-offer-host] .atgit-nudge__timer-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgb(242, 247, 251);
  animation: atgit-timer-blink 1.2s ease-in-out infinite;
}

[data-atgit-offer-host] .atgit-nudge__actions {
  position: relative;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 2px;
}

[data-atgit-offer-host] .atgit-nudge__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 16px;
  border: 0;
  border-radius: 999px;
  background: rgb(242, 247, 251);
  color: rgb(14, 33, 54);
  font-family: Figtree, sans-serif;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease;
}

[data-atgit-offer-host] .atgit-nudge__cta:hover {
  background: #fff;
  transform: translateY(-1px);
}

[data-atgit-offer-host] .atgit-nudge__secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid rgba(242, 247, 251, 0.22);
  border-radius: 999px;
  background: transparent;
  color: rgba(255, 255, 255, 0.88);
  font-family: Figtree, sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

[data-atgit-offer-host] .atgit-nudge__secondary:hover {
  background: rgba(242, 247, 251, 0.08);
}

[data-atgit-offer-host].is-hidden {
  display: none;
}

@keyframes atgit-nudge-in {
  from {
    opacity: 0;
    transform: translateY(18px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes atgit-plane-bob {
  0%,
  100% {
    transform: translateY(0) rotate(-8deg);
  }
  50% {
    transform: translateY(-3px) rotate(-2deg);
  }
}

@keyframes atgit-ring-pulse {
  0% {
    opacity: 0.9;
    transform: scale(0.92);
  }
  70% {
    opacity: 0;
    transform: scale(1.18);
  }
  100% {
    opacity: 0;
    transform: scale(1.18);
  }
}

@keyframes atgit-glow-pulse {
  0%,
  100% {
    opacity: 0.45;
    transform: scale(1);
  }
  50% {
    opacity: 0.85;
    transform: scale(1.12);
  }
}

@keyframes atgit-path-dot {
  0% {
    left: 0;
    opacity: 0;
  }
  12% {
    opacity: 1;
  }
  88% {
    opacity: 1;
  }
  100% {
    left: calc(100% - 5px);
    opacity: 0;
  }
}

@keyframes atgit-miniplane {
  0%,
  100% {
    transform: translateX(-6px) rotate(-12deg);
  }
  50% {
    transform: translateX(6px) rotate(4deg);
  }
}

@keyframes atgit-timer-blink {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.35;
  }
}

@media (max-width: 480px) {
  [data-atgit-offer-host] {
    left: 12px;
    right: 12px;
    bottom: 12px;
    width: auto;
  }
}
</style>

<script data-atgit-offer="js">
(function () {
  var STORAGE_KEY = "atgit-horizon-abandon-nudge-v2-dismissed";

  document.querySelectorAll("[data-atgit-offer-host]").forEach(function (node) {
    node.remove();
  });

  if (window.sessionStorage && sessionStorage.getItem(STORAGE_KEY) === "1") {
    return;
  }

  function parseAirport(value) {
    var text = (value || "").trim();
    var match = text.match(/^(.*?)\s*\(([A-Z]{3})\)\s*$/);
    if (match) {
      return { city: match[1].trim(), code: match[2] };
    }
    if (/^[A-Z]{3}$/.test(text)) {
      return { city: text, code: text };
    }
    return { city: text || "Your city", code: "—" };
  }

  function svgEl(tag, attrs) {
    var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (key) {
        el.setAttribute(key, attrs[key]);
      });
    }
    return el;
  }

  function makePlaneSvg(className) {
    var svg = svgEl("svg", {
      class: className,
      viewBox: "0 0 24 24",
      fill: "currentColor",
      "aria-hidden": "true"
    });
    var path = svgEl("path", {
      d: "M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"
    });
    svg.appendChild(path);
    return svg;
  }

  var form = document.querySelector("#flight-search");
  var fromInput = form ? form.querySelector('input[name="from"]') : null;
  var toInput = form ? form.querySelector('input[name="to"]') : null;
  var departInput = form ? form.querySelector('input[name="depart"]') : null;

  var from = parseAirport(fromInput && fromInput.value ? fromInput.value : "New York (JFK)");
  var to = parseAirport(toInput && toInput.value ? toInput.value : "London (LHR)");
  var departLabel = "";
  if (departInput && departInput.value) {
    try {
      var d = new Date(departInput.value + "T12:00:00");
      if (!isNaN(d.getTime())) {
        departLabel = d.toLocaleDateString(undefined, {
          month: "short",
          day: "numeric",
          year: "numeric"
        });
      }
    } catch (e) {}
  }

  var host = document.createElement("div");
  host.setAttribute("data-atgit-offer-host", "1");
  host.setAttribute("role", "dialog");
  host.setAttribute("aria-label", "Resume abandoned booking");

  var card = document.createElement("div");
  card.className = "atgit-nudge";

  var glow = document.createElement("div");
  glow.className = "atgit-nudge__glow";
  glow.setAttribute("aria-hidden", "true");

  var top = document.createElement("div");
  top.className = "atgit-nudge__top";

  var icon = document.createElement("div");
  icon.className = "atgit-nudge__icon";
  icon.setAttribute("aria-hidden", "true");
  var ring = document.createElement("span");
  ring.className = "atgit-nudge__icon-ring";
  icon.appendChild(ring);
  icon.appendChild(makePlaneSvg("atgit-nudge__plane"));

  var headingWrap = document.createElement("div");
  headingWrap.className = "atgit-nudge__heading";

  var eyebrow = document.createElement("p");
  eyebrow.className = "atgit-nudge__eyebrow";
  eyebrow.textContent = "Cart almost booked";

  var title = document.createElement("h2");
  title.className = "atgit-nudge__title";
  title.textContent = "Don’t lose this fare";

  headingWrap.appendChild(eyebrow);
  headingWrap.appendChild(title);

  var closeBtn = document.createElement("button");
  closeBtn.type = "button";
  closeBtn.className = "atgit-nudge__close";
  closeBtn.setAttribute("aria-label", "Dismiss");
  closeBtn.textContent = "×";

  top.appendChild(icon);
  top.appendChild(headingWrap);
  top.appendChild(closeBtn);

  var route = document.createElement("div");
  route.className = "atgit-nudge__route";

  var fromBlock = document.createElement("div");
  fromBlock.className = "atgit-nudge__airport";
  var fromCode = document.createElement("span");
  fromCode.className = "atgit-nudge__code";
  fromCode.textContent = from.code;
  var fromCity = document.createElement("span");
  fromCity.className = "atgit-nudge__city";
  fromCity.textContent = from.city;
  fromBlock.appendChild(fromCode);
  fromBlock.appendChild(fromCity);

  var flightpath = document.createElement("div");
  flightpath.className = "atgit-nudge__flightpath";
  flightpath.setAttribute("aria-hidden", "true");
  var line = document.createElement("span");
  line.className = "atgit-nudge__flightpath-line";
  var dot = document.createElement("span");
  dot.className = "atgit-nudge__flightpath-dot";
  flightpath.appendChild(line);
  flightpath.appendChild(dot);
  flightpath.appendChild(makePlaneSvg("atgit-nudge__miniplane"));

  var toBlock = document.createElement("div");
  toBlock.className = "atgit-nudge__airport atgit-nudge__airport--to";
  var toCode = document.createElement("span");
  toCode.className = "atgit-nudge__code";
  toCode.textContent = to.code;
  var toCity = document.createElement("span");
  toCity.className = "atgit-nudge__city";
  toCity.textContent = to.city;
  toBlock.appendChild(toCode);
  toBlock.appendChild(toCity);

  route.appendChild(fromBlock);
  route.appendChild(flightpath);
  route.appendChild(toBlock);

  var copy = document.createElement("p");
  copy.className = "atgit-nudge__copy";
  copy.textContent =
    "Your " +
    from.code +
    " → " +
    to.code +
    " trip is still in the cart. Complete booking before this fare refreshes.";

  var timer = document.createElement("div");
  timer.className = "atgit-nudge__timer";
  var timerDot = document.createElement("span");
  timerDot.className = "atgit-nudge__timer-dot";
  timerDot.setAttribute("aria-hidden", "true");
  var timerText = document.createElement("span");
  timerText.textContent = departLabel
    ? "Held for departure · " + departLabel
    : "Fare hold · limited time";
  timer.appendChild(timerDot);
  timer.appendChild(timerText);

  var actions = document.createElement("div");
  actions.className = "atgit-nudge__actions";

  var cta = document.createElement("a");
  cta.className = "atgit-nudge__cta";
  cta.href = "#search";
  cta.textContent = "Complete booking";

  var dismiss = document.createElement("button");
  dismiss.type = "button";
  dismiss.className = "atgit-nudge__secondary";
  dismiss.textContent = "Maybe later";

  actions.appendChild(cta);
  actions.appendChild(dismiss);

  card.appendChild(glow);
  card.appendChild(top);
  card.appendChild(route);
  card.appendChild(copy);
  card.appendChild(timer);
  card.appendChild(actions);
  host.appendChild(card);

  function hideNudge() {
    host.classList.add("is-hidden");
    try {
      if (window.sessionStorage) sessionStorage.setItem(STORAGE_KEY, "1");
    } catch (e) {}
  }

  closeBtn.addEventListener("click", hideNudge);
  dismiss.addEventListener("click", hideNudge);
  cta.addEventListener("click", function () {
    var search = document.querySelector("#search") || document.querySelector("#flight-search");
    if (search && typeof search.scrollIntoView === "function") {
      search.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  });

  document.body.appendChild(host);
})();
</script>
