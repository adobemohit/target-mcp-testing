<style data-atgit-offer="css">
/* Horizon — warm yellow flight news notification bar */
[data-atgit-offer-host] {
  box-sizing: border-box;
}

[data-atgit-offer-host],
[data-atgit-offer-host] * {
  box-sizing: border-box;
}

[data-atgit-offer-host][data-atgit-role="notif-bar"] {
  position: relative;
  z-index: 1000;
  width: 100%;
  background: linear-gradient(90deg, #ffe566 0%, #ffd54a 48%, #ffc933 100%);
  color: rgb(14, 33, 54);
  font-family: Figtree, sans-serif;
  border-bottom: 1px solid rgba(14, 33, 54, 0.12);
  box-shadow: 0 2px 10px rgba(14, 33, 54, 0.08);
}

[data-atgit-offer-host] .atgit-notif-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 1120px;
  margin: 0 auto;
  padding: 8px 20px;
  min-height: 36px;
}

[data-atgit-offer-host] .atgit-notif-label {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgb(14, 33, 54);
  color: #ffe566;
  font-family: Figtree, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.2;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(14, 33, 54, 0.18);
}

[data-atgit-offer-host] .atgit-notif-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ffe566;
  animation: atgit-pulse 1.6s ease-in-out infinite;
}

[data-atgit-offer-host] .atgit-marquee {
  flex: 1 1 auto;
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
}

[data-atgit-offer-host] .atgit-marquee-track {
  display: inline-flex;
  align-items: center;
  gap: 0;
  width: max-content;
  will-change: transform;
  animation: atgit-marquee 36s linear infinite;
}

[data-atgit-offer-host] .atgit-marquee:hover .atgit-marquee-track {
  animation-play-state: paused;
}

[data-atgit-offer-host] .atgit-marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 0 28px 0 0;
  font-family: Figtree, sans-serif;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  color: rgb(14, 33, 54);
  white-space: nowrap;
}

[data-atgit-offer-host] .atgit-marquee-sep {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(14, 33, 54, 0.35);
  flex: 0 0 auto;
}

[data-atgit-offer-host] .atgit-notif-cta {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: rgb(14, 33, 54);
  color: #ffe566;
  font-family: Figtree, sans-serif;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.2;
  text-decoration: none;
  white-space: nowrap;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(14, 33, 54, 0.2);
  transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
}

[data-atgit-offer-host] .atgit-notif-cta:hover,
[data-atgit-offer-host] .atgit-notif-cta:focus-visible {
  background: rgb(10, 24, 40);
  color: #fff3a8;
  outline: none;
  transform: translateY(-1px);
}

[data-atgit-offer-host] .atgit-notif-close {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: rgba(14, 33, 54, 0.65);
  font-family: Figtree, sans-serif;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  transition: background 0.2s ease, color 0.2s ease;
}

[data-atgit-offer-host] .atgit-notif-close:hover,
[data-atgit-offer-host] .atgit-notif-close:focus-visible {
  color: rgb(14, 33, 54);
  background: rgba(14, 33, 54, 0.1);
  outline: none;
}

@keyframes atgit-marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

@keyframes atgit-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(0.85); }
}

@media (max-width: 720px) {
  [data-atgit-offer-host] .atgit-notif-inner {
    gap: 8px;
    padding: 8px 12px;
  }

  [data-atgit-offer-host] .atgit-notif-cta {
    display: none;
  }

  [data-atgit-offer-host] .atgit-marquee-item {
    font-size: 12px;
    padding-right: 20px;
  }
}
</style>

<script data-atgit-offer="js">
(function () {
  var STORAGE_KEY = "atgit-horizon-notif-dismissed";

  document.querySelectorAll("[data-atgit-offer-host]").forEach(function (node) {
    node.remove();
  });

  try {
    if (window.sessionStorage && sessionStorage.getItem(STORAGE_KEY) === "1") {
      return;
    }
  } catch (e) {}

  var header = document.querySelector("header.site-header");
  if (!header || !header.parentNode) return;

  var newsItems = [
    "JFK → LHR nonstops from $418 through November — book early for peak autumn seats",
    "Tokyo premium-cabin flash sale: LAX → NRT from $692 round trip",
    "Flexible ±3 date search now live — save an average of $84 vs airline-direct",
    "Dubai free stopover packages available on select partners this week",
    "Midweek departures (Tue–Thu) typically 12–18% cheaper on long-haul routes"
  ];

  var host = document.createElement("div");
  host.setAttribute("data-atgit-offer-host", "1");
  host.setAttribute("data-atgit-role", "notif-bar");
  host.setAttribute("role", "region");
  host.setAttribute("aria-label", "Latest flight news and updates");

  var inner = document.createElement("div");
  inner.className = "atgit-notif-inner";

  var label = document.createElement("span");
  label.className = "atgit-notif-label";
  var dot = document.createElement("span");
  dot.className = "atgit-notif-dot";
  dot.setAttribute("aria-hidden", "true");
  label.appendChild(dot);
  label.appendChild(document.createTextNode("Flight updates"));

  var marquee = document.createElement("div");
  marquee.className = "atgit-marquee";

  var track = document.createElement("div");
  track.className = "atgit-marquee-track";

  function appendItems(container) {
    newsItems.forEach(function (text) {
      var item = document.createElement("span");
      item.className = "atgit-marquee-item";
      item.textContent = text;
      container.appendChild(item);

      var sep = document.createElement("span");
      sep.className = "atgit-marquee-sep";
      sep.setAttribute("aria-hidden", "true");
      container.appendChild(sep);
    });
  }

  appendItems(track);
  appendItems(track);
  marquee.appendChild(track);

  var cta = document.createElement("a");
  cta.className = "atgit-notif-cta";
  cta.href = "#deals";
  cta.textContent = "View deals";

  var closeBtn = document.createElement("button");
  closeBtn.type = "button";
  closeBtn.className = "atgit-notif-close";
  closeBtn.setAttribute("aria-label", "Dismiss flight updates");
  closeBtn.textContent = "×";
  closeBtn.addEventListener("click", function () {
    try {
      if (window.sessionStorage) sessionStorage.setItem(STORAGE_KEY, "1");
    } catch (err) {}
    host.remove();
  });

  inner.appendChild(label);
  inner.appendChild(marquee);
  inner.appendChild(cta);
  inner.appendChild(closeBtn);
  host.appendChild(inner);

  header.parentNode.insertBefore(host, header);
})();
</script>
