<style data-atgit-offer="css">
/* Offer styles — India slide inherits site .dest-slide theme */
[data-atgit-offer-host].dest-slide {
  box-sizing: border-box;
  font-family: Figtree, sans-serif;
}

[data-atgit-offer-host].dest-slide .dest-copy h3 {
  font-family: Figtree, sans-serif;
  color: inherit;
}

[data-atgit-offer-host].dest-slide .dest-copy p,
[data-atgit-offer-host].dest-slide .dest-copy a,
[data-atgit-offer-host].dest-slide .dest-price {
  font-family: Figtree, sans-serif;
}
</style>

<script data-atgit-offer="js">
// Offer script — DOM manipulation only (no HTML authoring).
(function () {
  var sliderEl =
    document.querySelector("#destinations .dest-slider") ||
    document.querySelector(".dest-slider");
  if (!sliderEl) return;

  var $ = window.jQuery || window.$;
  var useSlick =
    $ &&
    $.fn &&
    typeof $.fn.slick === "function" &&
    $(sliderEl).hasClass("slick-initialized");

  // Idempotent cleanup: remove prior offer slides (Slick-aware)
  if (useSlick) {
    var $slider = $(sliderEl);
    var indices = [];
    $slider
      .find(".slick-slide[data-atgit-offer-host]:not(.slick-cloned)")
      .each(function () {
        var idx = parseInt(this.getAttribute("data-slick-index"), 10);
        if (!isNaN(idx) && idx >= 0) indices.push(idx);
      });
    indices.sort(function (a, b) {
      return b - a;
    });
    indices.forEach(function (idx) {
      $slider.slick("slickRemove", idx);
    });
  }

  document.querySelectorAll("[data-atgit-offer-host]").forEach(function (node) {
    node.remove();
  });

  var slide = document.createElement("article");
  slide.className = "dest-slide";
  slide.setAttribute("data-atgit-offer-host", "1");

  var unsplash =
    "https://images.unsplash.com/photo-1564507592333-c60657eea523?auto=format&fit=crop&w=900&q=80";
  var img = document.createElement("img");
  img.alt = "Taj Mahal in Agra, India at sunrise";
  var sampleImg = document.querySelector(
    "#destinations .dest-slide img, .dest-slider img"
  );
  if (sampleImg && String(sampleImg.getAttribute("src") || "").indexOf("/api/preview/proxy") !== -1) {
    img.src = "/api/preview/proxy?url=" + encodeURIComponent(unsplash);
  } else {
    img.src = unsplash;
  }

  var price = document.createElement("span");
  price.className = "dest-price";
  price.textContent = "$649";

  var copy = document.createElement("div");
  copy.className = "dest-copy";

  var title = document.createElement("h3");
  title.textContent = "India";

  var desc = document.createElement("p");
  desc.textContent = "Round trip · Sunrise views of the Taj Mahal";

  var link = document.createElement("a");
  link.href = "#search";
  link.textContent = "View fares";

  copy.appendChild(title);
  copy.appendChild(desc);
  copy.appendChild(link);

  slide.appendChild(img);
  slide.appendChild(price);
  slide.appendChild(copy);

  if (useSlick) {
    $(sliderEl).slick("slickAdd", slide);
  } else {
    sliderEl.appendChild(slide);
  }
})();
</script>
